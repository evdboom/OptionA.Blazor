name: DevTeam integrity checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Define devteam artifact paths
        shell: pwsh
        run: |
          $artifactDir = Join-Path $env:RUNNER_TEMP 'devteam-integrity'
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
          "DEVTEAM_ARTIFACT_DIR=$artifactDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "DEVTEAM_DRYRUN_LOG=$(Join-Path $artifactDir 'reconcile-dry-run.log')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "DEVTEAM_PESTER_LOG=$(Join-Path $artifactDir 'reconcile-pester.log')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "DEVTEAM_PESTER_RESULTS=$(Join-Path $artifactDir 'reconcile-pester-results.xml')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "DEVTEAM_BACKUP_ZIP=$(Join-Path $artifactDir 'devteam-backup.zip')" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Pester
        shell: pwsh
        run: |
          $pesterModule = Get-Module -ListAvailable -Name Pester | Where-Object { $_.Version -ge [version]'5.0.0' } | Sort-Object Version -Descending | Select-Object -First 1
          if (-not $pesterModule) {
            Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck -MinimumVersion 5.0.0
          }

      - name: Run devteam integrity script (dry-run)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          ./.devteam/scripts/reconcile-workspace-state.ps1 -DryRun *>&1 | Tee-Object -FilePath $env:DEVTEAM_DRYRUN_LOG

      - name: Run reconcile Pester tests
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Import-Module Pester -MinimumVersion 5.0.0 -Force
          $config = New-PesterConfiguration
          $config.Run.Path = '.devteam/tests/reconcile.Tests.ps1'
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputFormat = 'NUnitXml'
          $config.TestResult.OutputPath = $env:DEVTEAM_PESTER_RESULTS

          Start-Transcript -Path $env:DEVTEAM_PESTER_LOG -Force
          try {
            $result = Invoke-Pester -Configuration $config -PassThru
          }
          finally {
            Stop-Transcript
          }

          if ($result.FailedCount -gt 0) {
            throw "Pester reported $($result.FailedCount) failing test(s)."
          }

      - name: Create .devteam backup (zip)
        if: always()
        shell: pwsh
        run: |
          if (Test-Path '.devteam') {
            Compress-Archive -Path '.devteam\*' -DestinationPath $env:DEVTEAM_BACKUP_ZIP -Force
          } else {
            Write-Host '.devteam not found; skipping backup creation.'
            exit 0
          }

      - name: Upload devteam integrity artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: devteam-integrity
          if-no-files-found: warn
          path: |
            ${{ env.DEVTEAM_DRYRUN_LOG }}
            ${{ env.DEVTEAM_PESTER_LOG }}
            ${{ env.DEVTEAM_PESTER_RESULTS }}
            ${{ env.DEVTEAM_BACKUP_ZIP }}
